# Test Profile Configuration
spring.application.name=java-spring-boot-0137-test

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console - Disabled for security
spring.h2.console.enabled=false

# Flyway - Disabled for tests
spring.flyway.enabled=false

# JWT Test Configuration
jwt.secret=test-secret-key-for-testing-minimum-256-bits-required-here
jwt.expiration=86400000

# CORS
allowed.origins=http://localhost:3000

# Actuator
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.ecommerce.platform=WARN
