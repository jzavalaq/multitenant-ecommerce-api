# Development Profile - H2 Database
spring:
  datasource:
    url: jdbc:h2:mem:${spring.application.name:-devdb};DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

# JWT for dev
jwt:
  secret: dev-secret-key-for-testing-only-minimum-32-chars

logging:
  level:
    root: DEBUG
