# Application
spring.application.name=java-spring-boot-0137
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}

# Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# Actuator
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# Security
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# JWT
jwt.secret=${JWT_SECRET:change-me-in-production-use-256-bit-key-minimum-32-chars}
jwt.expiration=86400000

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Pagination
app.pagination.max-page-size=100

# Logging
logging.level.com.ecommerce.platform=INFO
logging.pattern.correlation=%X{correlationId}
